general {
    col.active_border = rgb({{ colors.on_surface.dark.hex_stripped }})
    col.inactive_border = rgb({{ colors.primary.dark.hex_stripped }})
}

group {
    col.border_active = rgb({{ colors.on_surface.dark.hex_stripped }})
    col.border_inactive = rgb({{ colors.primary.dark.hex_stripped }})
    col.border_locked_active = rgb({{ colors.on_surface.dark.hex_stripped }})
    col.border_locked_inactive = rgb({{ colors.primary.dark.hex_stripped }})

    groupbar {
        col.active = rgb({{ colors.primary.dark.hex_stripped }})
        col.inactive = rgb({{ colors.surface.dark.hex_stripped }})
        col.locked_active = rgb({{ colors.primary.dark.hex_stripped }})
        col.locked_inactive = rgb({{ colors.surface.dark.hex_stripped }})
        text_color = rgb({{ colors.on_surface.dark.hex_stripped }})
    }
}

decoration {
    rounding = {{ okshell.sizing.radius_window }}
    active_opacity = {{ okshell.opacity }}
    inactive_opacity = {{ okshell.opacity }}
}

general {
    border_size = {{ okshell.sizing.border_width }}
}